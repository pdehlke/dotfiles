# Canonical tmux config (XDG location). ~/.tmux.conf just sources this file.

# --- Terminal / color capabilities ---
set -s default-terminal 'tmux-256color'
set-option -sa terminal-features ',tmux*:title'
set-option -sa terminal-features ',*256color:256'
set-option -sa terminal-features ',*direct:Tc:RGB:256:smxx=\E[9m'
set-option -sa terminal-features ',alacritty:RGB:256:clipboard:ccolour:cstyle:focus:title:extkeys:overline'
set-option -sa terminal-features ',*kitty*:Tc:RGB:256:clipboard:ccolour:cstyle:focus:title:usstyle:extkeys:overline:strikethrough'
set-option -sa terminal-overrides ',tmux*:XT:Ss=\E[%p1%d q:Se=\E[3 q'
set-option -sa terminal-overrides ',*256color:256'
set-option -sa terminal-overrides ',*direct:Tc:RGB:256'
set-option -sa terminal-overrides ',alacritty:RGB:256:XT'
set-option -sa terminal-overrides ',*kitty*:Tc:RGB:256:XT'
set -s set-clipboard on

# --- General behavior ---
set -g bell-action any
set -g display-time 1000
set -g history-limit 1000000
set -g detach-on-destroy off
set -g focus-events on
setw -g monitor-activity on
set -g visual-activity on
setw -g aggressive-resize on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g set-titles on
set -g set-titles-string "#S #I:#P #W:#T"
set -g mouse on
set -g status-keys vi
setw -g mode-keys vi
set -sg escape-time 0
set -g assume-paste-time 0
set -g status-position bottom
set-option -g default-command "exec ${SHELL}"

# --- Prefix: screen-like C-a ---
unbind C-b
set -g prefix C-a
bind a send-prefix
bind C-a send-prefix
bind-key ^D detach-client

# --- Panes / windows ---
bind-key ^V split-window -h -c '#{pane_current_path}'
unbind %
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind b break-pane -d
bind P choose-tree -ZG
bind c new-window -c '#{pane_current_path}'
unbind l
bind C-b last-window
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded!'
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# --- workmux ---
bind-key C-t run-shell "workmux sidebar"
bind-key C-w display-popup -h 70% -w 70% -E "workmux dashboard"

# --- Smart pane switching aware of vim splits ---
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'send-keys C-l \; select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# --- Copy mode (vi) ---
bind-key -T edit-mode-vi Up send-keys -X history-up
bind-key -T edit-mode-vi Down send-keys -X history-down
bind-key -T copy-mode-vi Escape send-keys -X clear-selection
bind-key -T copy-mode-vi i send-keys -X cancel
unbind-key -T copy-mode-vi p     ;   bind-key -T copy-mode-vi p   send-keys -X paste-buffer
unbind-key -T copy-mode-vi Space ;   bind-key -T copy-mode-vi v   send-keys -X begin-selection
unbind-key -T copy-mode-vi V     ;   bind-key -T copy-mode-vi V   send-keys -X start-of-line        \; send-keys -X begin-selection \; send-keys -X end-of-line
unbind-key -T copy-mode-vi Enter ;   bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
unbind-key -T copy-mode-vi Y     ;   bind-key -T copy-mode-vi Y   send-keys -X start-of-line        \; send-keys -X begin-selection \; send-keys -X end-of-line \; send-keys -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'
unbind-key -T copy-mode-vi C-v   ;   bind-key -T copy-mode-vi C-v send-keys -X begin-selection      \; send-keys -X rectangle-toggle
unbind-key -T copy-mode-vi [     ;   bind-key -T copy-mode-vi [   send-keys -X begin-selection
unbind-key -T copy-mode-vi ]     ;   bind-key -T copy-mode-vi ]   send-keys -X copy-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'

# sesh integration
unbind T
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key -n DoubleClick1Pane \
    select-pane \; \
    copy-mode -M \; \
    send-keys -X select-word \; \
    run-shell "sleep .5s" \; \
    send-keys -X copy-selection-and-cancel\; run "tmux save-buffer - | pbcopy"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'pdehlke/tmux2k'
set -g @plugin '2kabhishek/tmux-tilit'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'

# extrakto
set -g @extrakto_fzf_layout 'reverse'
set -g @extrakto_key 'f'
set -g @extrakto_insert_key 'enter'
set -g @extrakto_copy_key 'ctrl-y'

# tmux2k (catppuccin theme; owns status bar, message-style, pane borders)
set -g @tmux2k-theme "catppuccin"
set -g @tmux2k-icons-only "false"
set -g @tmux2k-right-plugins "tdo cpu ram battery weather"
set -g @tmux2k-weather-scale f
# set -g @tmux2k-weather-location Tucson
set -g @tmux2k-weather-refresh-rate 300
set -g @tmux2k-weather-display-location true
set -g @tmux2k-pane-active-border "#1688f0"
set -g @tmux2k-pane-border "#3f3f4f"

# tilit
set -g @tilit-navigator 'on'
set -g @tilit-autotiling 'on'
set -g @tilit-config "$HOME/.config/tmux/tmux.conf"

# Save every 15 minutes (the default)
set -g @continuum-save-interval '15'

# Machine-local overrides, not tracked in chezmoi
if-shell "[ -f ~/.tmux.conf.user ]" 'source ~/.tmux.conf.user'

# --- Bootstrap TPM if missing, then run it (must stay last) ---
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
run -b '~/.config/tmux/plugins/tpm/tpm'

# Continuum's "another tmux server running" startup check false-positives under
# zsh4humans (one tmux server per shell tab), so it never wires its periodic
# save hook into status-right. Splice it in ourselves once plugins settle.
run-shell -b 'sleep 1; tmux set-option -ga status-right "##(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"'

